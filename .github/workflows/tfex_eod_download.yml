name: TFEX EOD OI Downloader

# รัน 09:00 น. Bangkok (UTC+7) = 02:00 UTC
# จันทร์-ศุกร์ (วันจันทร์จะดึงข้อมูลวันศุกร์ที่แล้ว)
on:
  schedule:
    - cron: '0 2 * * 1-5'   # 09:00 BKK, Mon-Fri

  # รันด้วยมือได้ (กดปุ่มใน GitHub UI)
  workflow_dispatch:
    inputs:
      trade_date:
        description: 'วันที่ต้องการ YYYY-MM-DD (ว่าง = เมื่อวาน)'
        required: false
        default: ''

jobs:
  download-eod:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ─── 1. Checkout repo ───────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ─── 2. Setup Python ────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ─── 3. Install dependencies ────────────────────────────
      - name: Install dependencies
        run: |
          pip install playwright requests pandas numpy pyarrow schedule -q
          playwright install chromium --with-deps

      # ─── 4. Determine trade date ────────────────────────────
      - name: Set trade date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.trade_date }}" ]; then
            TRADE_DATE="${{ github.event.inputs.trade_date }}"
          else
            # เมื่อวาน (วันทำการ) — Bangkok time
            TRADE_DATE=$(TZ='Asia/Bangkok' python3 -c "
          from datetime import date, timedelta
          import sys
          today = date.today()
          d = today - timedelta(days=1)
          while d.weekday() >= 5:  # skip weekend
              d -= timedelta(days=1)
          print(d.strftime('%Y-%m-%d'))
          ")
          fi
          echo "trade_date=$TRADE_DATE" >> $GITHUB_OUTPUT
          echo "📅 Trade date: $TRADE_DATE"

      # ─── 5. Download OI from TFEX ───────────────────────────
      - name: Download TFEX EOD OI
        run: |
          echo "Downloading OI for ${{ steps.date.outputs.trade_date }}..."
          python scripts/options_regime/tfex_eod_downloader.py \
            --date ${{ steps.date.outputs.trade_date }} \
            --playwright
        env:
          PYTHONPATH: .

      # ─── 6. Verify download ─────────────────────────────────
      - name: Verify downloaded data
        run: |
          python scripts/options_regime/tfex_eod_downloader.py \
            --verify ${{ steps.date.outputs.trade_date }}

      # ─── 7. Commit & Push ───────────────────────────────────
      - name: Commit OI data to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # เพิ่มเฉพาะไฟล์ Option EOD
          git add "Option EOD/${{ steps.date.outputs.trade_date }}/" || true
          git add "Option EOD/latest.parquet" || true

          # ตรวจว่ามีไฟล์ใหม่ไหม
          if git diff --cached --quiet; then
            echo "ℹ️  No new files to commit"
          else
            git commit -m "📊 TFEX OI: ${{ steps.date.outputs.trade_date }} [auto]"
            git push
            echo "✅ Committed and pushed OI data"
          fi

      # ─── 8. Summary ─────────────────────────────────────────
      - name: Job Summary
        if: always()
        run: |
          echo "## 📊 TFEX EOD Download Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Trade Date | ${{ steps.date.outputs.trade_date }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run Time (BKK) | $(TZ='Asia/Bangkok' date '+%Y-%m-%d %H:%M') |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY

          # แสดงไฟล์ที่ดาวน์โหลด
          PARQUET="Option EOD/${{ steps.date.outputs.trade_date }}/${{ steps.date.outputs.trade_date }}_options_eod.parquet"
          if [ -f "$PARQUET" ]; then
            SIZE=$(du -h "$PARQUET" | cut -f1)
            echo "| File Size | $SIZE |" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import pandas as pd
          df = pd.read_parquet('$PARQUET')
          print(f'| Total Rows | {len(df)} |')
          print(f'| Total OI | {int(df[\"oi\"].sum()):,} |')
          print(f'| Total Volume | {int(df[\"volume\"].sum()):,} |')
          print(f'| Strikes | {df[\"strike\"].min()}–{df[\"strike\"].max()} |')
          " >> $GITHUB_STEP_SUMMARY
          fi
